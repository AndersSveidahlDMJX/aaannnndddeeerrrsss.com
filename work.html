<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/webp" href="images/fly emoji.webp" />
  <title>Work — aaannndddeeerrrsss</title>
  <meta name="description" content="Selected work by Anders. Brand identity, print, and digital design projects." />
  <style>
    @font-face {
      font-family: 'SFProDisplay';
      src: url('fonts/SFPRODISPLAYREGULAR.OTF') format('opentype');
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    .back {
      position: fixed;
      top: 30px;
      left: 30px;
      text-decoration: none;
      color: #fff;
      font-size: 1.5rem;
      z-index: 10;
      opacity: 0.8;
      transition: opacity 0.2s ease;
    }
    .back:hover { opacity: 1; }
    .mute-toggle {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 10;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.5);
      color: #fff;
      font-size: 1rem;
      padding: 8px 16px;
      cursor: pointer;
      border-radius: 4px;
      backdrop-filter: blur(4px);
      transition: background 0.2s ease;
    }
    .mute-toggle:hover { background: rgba(255,255,255,0.3); }
    .grid, .shadow-grid {
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .grid.visible, .shadow-grid.visible {
      opacity: 1;
    }
    .grid {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: grid;
      grid-template-columns: repeat(3, 250px);
      grid-template-rows: repeat(2, auto);
      column-gap: 19px;
      row-gap: 9px;
      z-index: 5;
    }
    .shadow-grid {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(calc(-50% - 4px), calc(-50% + 4px));
      display: grid;
      grid-template-columns: repeat(3, 250px);
      grid-template-rows: repeat(2, 250px);
      column-gap: 19px;
      row-gap: 9px;
      z-index: 4;
      pointer-events: none;
      overflow: visible;
    }
    .shadow-card {
      width: 250px;
      height: 250px;
      filter: blur(13px);
      overflow: visible;
    }
    .shadow-card-inner {
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.72);
      -webkit-mask-image: url('images/folder_icon.svg');
      -webkit-mask-size: 100% 100%;
      -webkit-mask-repeat: no-repeat;
      mask-image: url('images/folder_icon.svg');
      mask-size: 100% 100%;
      mask-repeat: no-repeat;
    }
    .card-wrap {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0px;
    }
    .card-label {
      font-family: 'SFProDisplay', sans-serif;
      color: #fff;
      font-size: 1rem;
      text-align: center;
      text-decoration: none;
      opacity: 0;
      letter-spacing: 0.02em;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8), 0 0px 10px rgba(0,0,0,0.5);
      filter: blur(2.5px);
      transition: opacity 0.3s ease, filter 0.3s ease;
    }
    .card-wrap:hover .card-label {
      opacity: 1;
      filter: blur(0px);
    }
    a.card-link, a.card-link * { text-decoration: none; }
    .card-link:nth-child(1) .card img {
      transform: translateY(5px) scale(1.1);
    }
    .card-link:nth-child(2) .card img {
      transform: translateY(15px) scale(0.9);
    }
    .card-link:nth-child(3) .card {
      background: rgba(255,255,255,1);
      transition: background 0.3s ease;
    }
    .card-link:nth-child(3) .card-wrap:hover .card {
      background: rgba(255,255,255,1);
    }
    .card-link:nth-child(3) .card img {
      object-fit: contain;
      transform: scale(0.8);
    }
    .card-link:nth-child(4) .card {
      background: #ec702e;
    }
    .card-link:nth-child(4) .card img {
      object-fit: cover;
      transform: scale(0.93);
    }
    .card-link:nth-child(5) .card img {
      object-fit: cover;
      transform: translateY(8px) scale(0.95);
    }
    .card {
      width: 250px;
      height: 250px;
      position: relative;
      -webkit-mask-image: url('images/folder_icon.svg');
      -webkit-mask-size: 100% 100%;
      -webkit-mask-repeat: no-repeat;
      -webkit-mask-position: center;
      mask-image: url('images/folder_icon.svg');
      mask-size: 100% 100%;
      mask-repeat: no-repeat;
      mask-position: center;
    }
    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(0px);
      -webkit-backdrop-filter: blur(0px);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.6),
        inset 0 0 0 1px rgba(255,255,255,0.15);
      opacity: 1;
      transition: opacity 0.3s ease, backdrop-filter 0.3s ease, -webkit-backdrop-filter 0.3s ease;
      pointer-events: none;
    }
    .card-wrap:hover .card {
      -webkit-mask-image: url('images/folder_icon_sharp.svg');
      mask-image: url('images/folder_icon_sharp.svg');
    }
    .card-wrap:hover .card::after {
      opacity: 0;
    }
    .grid:has(.card-wrap:hover) .card-wrap:not(:hover) .card::after {
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
    }
    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 1;
      filter: blur(0px);
    }
    #yt-player {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 100vw;
      height: 56.25vw;
      min-height: 100vh;
      min-width: 177.78vh;
      transform: translate(-50%, -50%);
      border: none;
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      transition: opacity 1.5s ease;
    }
    #yt-player.visible {
      opacity: 1;
    }
    #still {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 100vw;
      height: 56.25vw;
      min-height: 100vh;
      min-width: 177.78vh;
      transform: translate(-50%, -50%);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
      pointer-events: none;
    }

    @media (max-width: 768px) {
      body {
        background: #111;
        overflow-y: auto;
        height: auto;
        min-height: 100vh;
        padding: 72px 16px 48px;
      }

      #yt-player,
      #still { display: none; }

      .mute-toggle { display: none; }

      .shadow-grid { display: none; }

      .back {
        top: 20px;
        left: 20px;
        font-size: 2rem;
      }

      .grid {
        position: static;
        transform: none;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        column-gap: 12px;
        row-gap: 20px;
        width: 100%;
        opacity: 1;
      }

      .card-link { width: 100%; }

      .card-wrap { width: 100%; }

      .card {
        width: 100%;
        height: auto;
        aspect-ratio: 1;
      }

      /* Reset all per-card desktop img transforms */
      .card-link:nth-child(1) .card img,
      .card-link:nth-child(2) .card img,
      .card-link:nth-child(3) .card img,
      .card-link:nth-child(4) .card img,
      .card-link:nth-child(5) .card img {
        transform: none;
      }

      /* Labels always visible on mobile */
      .card-label {
        opacity: 1;
        filter: blur(0px);
        font-size: 0.85rem;
        margin-top: 4px;
      }

      /* No hover effects on mobile */
      .card-wrap:hover .card {
        -webkit-mask-image: url('images/folder_icon.svg');
        mask-image: url('images/folder_icon.svg');
      }
      .card-wrap:hover .card::after { opacity: 1; }
      .grid:has(.card-wrap:hover) .card-wrap:not(:hover) .card::after {
        backdrop-filter: blur(0px);
        -webkit-backdrop-filter: blur(0px);
      }
    }
  </style>
</head>
<body>
  <h1 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap">Work — aaannndddeeerrrsss</h1>
  <a class="back" href="index.html">←</a>
  <iframe id="yt-player" allow="autoplay; encrypted-media" frameborder="0"></iframe>
  <div id="still"></div>
  <div class="shadow-grid">
    <div class="shadow-card"><div class="shadow-card-inner"></div></div>
    <div class="shadow-card"><div class="shadow-card-inner"></div></div>
    <div class="shadow-card"><div class="shadow-card-inner"></div></div>
    <div class="shadow-card"><div class="shadow-card-inner"></div></div>
    <div class="shadow-card"><div class="shadow-card-inner"></div></div>
    <div class="shadow-card"><div class="shadow-card-inner"></div></div>
  </div>
  <div class="grid">
    <a class="card-link" href="project-1.html"><div class="card-wrap"><div class="card"><img src="images/twix%20.jpg" alt="" /></div><span class="card-label">Twix</span></div></a>
    <a class="card-link" href="project-2.html"><div class="card-wrap"><div class="card"><img src="images/The Fizz Cap Lockup.jpg" alt="" /></div><span class="card-label">The Fizz Cap</span></div></a>
    <a class="card-link" href="project-3.html"><div class="card-wrap"><div class="card"><img src="images/Bones.png" alt="" /></div><span class="card-label">Bones</span></div></a>
    <a class="card-link" href="project-4.html"><div class="card-wrap"><div class="card"><img src="images/le_ice.png" alt="" /></div><span class="card-label">Le Ice</span></div></a>
    <a class="card-link" href="project-5.html"><div class="card-wrap"><div class="card"><img src="images/penguin thumbnail.jpg" alt="" /></div><span class="card-label">Penguin</span></div></a>
    <a class="card-link" href="project-6.html"><div class="card-wrap"><div class="card"><img src="images/mex&amp;co.png" alt="" /></div><span class="card-label">Mex&amp;Co</span></div></a>
  </div>
  <button class="mute-toggle" id="muteBtn">🔇 unmute</button>
  <script>
    var muted = true;

    var videos = [
      { id: '8kEzFZvtLzM', still: 'images/livestream_still.jpg' },
      { id: 'Thtj8Ht7Z_c', still: 'images/maldiverne.jpg' }
    ];
    var chosen = videos[Math.floor(Math.random() * videos.length)];

    document.getElementById('still').style.backgroundImage = "url('" + chosen.still + "')";

    var iframe = document.getElementById('yt-player');
    iframe.src = 'https://www.youtube.com/embed/' + chosen.id +
      '?autoplay=1&mute=1&loop=1&playlist=' + chosen.id +
      '&controls=0&playsinline=1&disablekb=1&modestbranding=1&rel=0&enablejsapi=1' +
      '&origin=' + encodeURIComponent(location.origin);

    var revealed = false;
    function revealPlayer() {
      if (revealed) return;
      revealed = true;
      setTimeout(function() { iframe.classList.add('visible'); }, 500);
    }

    // Listen for YouTube player ready/state events and force play + mute (Safari fix)
    window.addEventListener('message', function(e) {
      if (e.origin !== 'https://www.youtube.com') return;
      try {
        var data = JSON.parse(e.data);
        if (data.event === 'onReady') {
          iframe.contentWindow.postMessage(JSON.stringify({ event: 'command', func: 'mute', args: [] }), '*');
          iframe.contentWindow.postMessage(JSON.stringify({ event: 'command', func: 'playVideo', args: [] }), '*');
          revealPlayer();
        }
        if (data.event === 'infoDelivery' && data.info && data.info.playerState === 1) {
          revealPlayer();
        }
      } catch(err) {}
    });

    // Fallback: reveal after 4s regardless
    setTimeout(revealPlayer, 4000);

    document.getElementById('muteBtn').addEventListener('click', function() {
      var func = muted ? 'unMute' : 'mute';
      iframe.contentWindow.postMessage(
        JSON.stringify({ event: 'command', func: func, args: [] }), '*'
      );
      this.textContent = muted ? '🔊 mute' : '🔇 unmute';
      muted = !muted;
    });
  </script>
  <script>
    window.addEventListener('load', function() {
      document.querySelector('.grid').classList.add('visible');
      document.querySelector('.shadow-grid').classList.add('visible');
    });
  </script>
</body>
</html>

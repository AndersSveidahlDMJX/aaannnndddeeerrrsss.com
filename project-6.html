<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style id="page-load-bg">body{background:#000!important}</style>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/webp" href="images/fly emoji.webp" />
  <title>Mex&amp;Co — aaannndddeeerrrsss</title>
  <meta name="description" content="Mex&Co — a brand identity project by Anders." />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fff; font-family: sans-serif; }
    .back {
      position: fixed;
      top: 30px;
      left: 30px;
      text-decoration: none;
      color: #000;
      font-size: 1.5rem;
      opacity: 0.8;
      transition: opacity 0.2s ease;
      z-index: 10;
    }
    .back:hover { opacity: 1; }
    .layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: 360px;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
      padding: 90px 40px 40px;
      border-right: 1px solid #e0e0e0;
      box-shadow: 2px 0 12px rgba(0,0,0,0.07);
      transition: width 0.35s ease, padding 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
    }
    .sidebar.collapsed {
      width: 0;
      padding: 0;
      border-color: transparent;
      box-shadow: none;
    }
    /* ── Sidebar toggle tab ── */
    .sidebar-toggle {
      position: fixed;
      top: 50vh;
      left: 360px;
      transform: translate(0, -50%);
      z-index: 20;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-left: none;
      box-shadow: 3px 0 10px rgba(0,0,0,0.10);
      border-radius: 0 6px 6px 0;
      width: 18px;
      height: 52px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      color: #999;
      transition: left 0.35s ease, color 0.15s ease, box-shadow 0.15s ease;
      padding: 0;
      user-select: none;
      line-height: 1;
    }
    .sidebar-toggle:hover { color: #333; box-shadow: 4px 0 14px rgba(0,0,0,0.18); }
    .sidebar-toggle.collapsed { left: 0; }
    .section { padding: 32px 0; border-top: 1px solid #e0e0e0; }
    .section:first-child { border-top: none; padding-top: 0; }
    .section-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 12px;
    }
    .section-body { font-size: 0.95rem; line-height: 1.75; color: #111; }
    .section-body p + p { margin-top: 0.9rem; }
    .content { flex: 1; padding: 80px 60px; }
    @media (max-width: 768px) {
      .layout { flex-direction: column; }
      .sidebar {
        position: static;
        height: auto;
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #e0e0e0;
        padding: 72px 24px 32px;
      }
      .content { padding: 32px 20px 60px; }
      .back { top: 16px; left: 16px; }
      .sidebar-toggle { display: none; }
    }
  </style>
</head>
<body>
  <h1 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap">Mex&amp;Co — Brand Project</h1>
  <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">&#8249;</button>
  <div class="layout">
    <aside class="sidebar">
      <div class="section">
        <div class="section-label" data-i18n="lbl-brief">Brief</div>
        <div class="section-body"><p></p></div>
      </div>
      <div class="section">
        <div class="section-label" data-i18n="lbl-insight">Insight</div>
        <div class="section-body"><p></p></div>
      </div>
      <div class="section">
        <div class="section-label" data-i18n="lbl-solution">Solution</div>
        <div class="section-body"><p></p></div>
      </div>
    </aside>
    <main class="content">
    </main>
  </div>
<script>
    // ── Sidebar toggle ──────────────────────────────────────────────────────
    const sidebar   = document.querySelector('.sidebar');
    const toggleBtn = document.getElementById('sidebarToggle');
    function setSidebar(collapsed) {
      if (collapsed) {
        sidebar.classList.add('collapsed');
        toggleBtn.classList.add('collapsed');
        toggleBtn.innerHTML = '&#8250;';
        document.body.classList.add('sb-collapsed');
      } else {
        sidebar.classList.remove('collapsed');
        toggleBtn.classList.remove('collapsed');
        toggleBtn.innerHTML = '&#8249;';
        document.body.classList.remove('sb-collapsed');
      }
    }
    toggleBtn.addEventListener('click', () => {
      setSidebar(!sidebar.classList.contains('collapsed'));
    });
  </script>
<script src="lang.js"></script>
</body>
</html>

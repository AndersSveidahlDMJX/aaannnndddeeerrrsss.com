<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style id="page-load-bg">body{background:#000!important}</style>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/webp" href="images/fly emoji.webp" />
  <link rel="preload" href="images/penguin/nothing.webp" as="image" />
  <link rel="preload" href="images/penguin/nothing%20keeping.webp" as="image" />
  <title>Monotype × Penguin — aaannndddeeerrrsss</title>
  <meta name="description" content="Monotype x Penguin — a typography and book design project by Anders." />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ff6600; font-family: sans-serif; }
    .back {
      position: fixed;
      top: 30px;
      left: 30px;
      text-decoration: none;
      color: #000;
      font-size: 1.5rem;
      opacity: 0.8;
      transition: opacity 0.2s ease;
      z-index: 10;
    }
    .back:hover { opacity: 1; }
    .layout { display: flex; height: 100vh; overflow: hidden; }
    .sidebar {
      width: 360px;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
      padding: 90px 40px 40px;
      border-right: 1px solid #e0e0e0;
      box-shadow: 2px 0 12px rgba(0,0,0,0.07);
      background: #fff;
      transition: width 0.35s ease, padding 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
    }
    .sidebar.collapsed {
      width: 0;
      padding: 0;
      border-color: transparent;
      box-shadow: none;
    }
    /* ── Sidebar toggle tab ── */
    .sidebar-toggle {
      position: fixed;
      top: 50vh;
      left: 360px;
      transform: translate(0, -50%);
      z-index: 20;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-left: none;
      box-shadow: 3px 0 10px rgba(0,0,0,0.10);
      border-radius: 0 6px 6px 0;
      width: 18px;
      height: 52px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      color: #999;
      transition: left 0.35s ease, color 0.15s ease, box-shadow 0.15s ease;
      padding: 0;
      user-select: none;
      line-height: 1;
    }
    .sidebar-toggle:hover { color: #333; box-shadow: 4px 0 14px rgba(0,0,0,0.18); }
    .sidebar-toggle.collapsed { left: 0; }
    body.sb-collapsed .page-title { left: 0; }
    body.sb-collapsed .page-footer { left: 0; }
    .section { padding: 32px 0; border-top: 1px solid #e0e0e0; }
    .section:first-child { border-top: none; padding-top: 0; }
    .section-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 12px;
    }
    .section-body { font-size: 0.95rem; line-height: 1.75; color: #111; }
    .section-body p + p { margin-top: 0.9rem; }
    .content { flex: 1; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: visible; }
    .page-title {
      font-family: 'Gill Sans', 'Gill Sans MT', Calibri, sans-serif;
      font-size: 3.5rem;
      font-weight: normal;
      letter-spacing: 0.05em;
      margin: 0;
      color: #111;
      text-align: center;
      position: fixed;
      top: 28px;
      left: 360px;
      right: 0;
      z-index: 5;
      transition: left 0.35s ease;
    }
    .image-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      width: min(97.5vh, 90%);
      flex: none;
      margin-top: 25px;
      overflow: visible;
    }
    .image-grid img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 4px;
      border: 3px solid #000;
      box-shadow: 4px 4px 0px rgba(0,0,0,0.6);
      cursor: pointer;
      transition: transform 0.3s ease, filter 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease, opacity 0.3s ease;
      position: relative;
      z-index: 1;
    }

    .image-grid img:hover {
      z-index: 10;
      transform: translateY(-8px) translateX(-8px);
      box-shadow: 12px 12px 0px rgba(0,0,0,0.6);
    }
    .page-footer {
      position: fixed;
      bottom: 20px;
      left: 360px;
      right: 0;
      display: flex;
      justify-content: center;
      z-index: 5;
      transition: left 0.35s ease;
    }
    .page-footer img {
      height: 48px;
      width: auto;
    }
    @media (max-width: 768px) {
      /* Allow page to scroll */
      .layout {
        flex-direction: column;
        height: auto;
        overflow: visible;
      }
      .sidebar {
        position: static;
        height: auto;
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #e0e0e0;
        padding: 72px 24px 32px;
      }
      .content {
        height: auto;
        padding: 20px 16px 80px;
        align-items: center;
        flex-direction: column;
      }

      /* Reposition title to flow with content */
      .page-title {
        position: static;
        font-size: 2.2rem;
        text-align: center;
        padding: 20px 0 8px;
      }

      /* 2-column grid on mobile */
      .image-grid {
        grid-template-columns: repeat(2, 1fr);
        width: 100%;
        gap: 8px;
        margin-top: 12px;
        overflow: visible;
      }

      /* Disable hover lift on mobile (touch) */
      .image-grid img:hover {
        transform: none;
        box-shadow: 4px 4px 0px rgba(0,0,0,0.6);
      }

      /* Footer: flow below grid */
      .page-footer {
        position: static;
        margin-top: 24px;
        margin-bottom: 24px;
      }

      /* Back arrow */
      .back { top: 16px; left: 16px; }
      .sidebar-toggle { display: none; }
    }
    /* Lightbox */
    #pg-lb {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 500;
      align-items: center;
      justify-content: center;
    }
    #pg-lb.open { display: flex; }
    #pg-lb-img {
      max-height: 88vh;
      max-width: 80vw;
      border-radius: 4px;
      object-fit: contain;
      user-select: none;
    }
    #pg-lb-close {
      position: fixed;
      top: 24px;
      right: 32px;
      font-size: 2rem;
      color: #fff;
      cursor: pointer;
      opacity: 0.8;
      z-index: 501;
      line-height: 1;
      transition: opacity 0.2s;
    }
    #pg-lb-close:hover { opacity: 1; }
    .pg-lb-arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      font-size: 2.5rem;
      color: #fff;
      cursor: pointer;
      opacity: 0.7;
      z-index: 501;
      padding: 12px;
      user-select: none;
      transition: opacity 0.2s;
    }
    .pg-lb-arrow:hover { opacity: 1; }
    #pg-lb-prev { left: 24px; }
    #pg-lb-next { right: 24px; }
  </style>
</head>
<body>
  <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">&#8249;</button>
  <div class="layout">
    <aside class="sidebar">
      <div class="section">
        <div class="section-label" data-i18n="lbl-brief">Brief</div>
        <div class="section-body"><p></p></div>
      </div>
      <div class="section">
        <div class="section-label" data-i18n="lbl-insight">Insight</div>
        <div class="section-body"><p></p></div>
      </div>
      <div class="section">
        <div class="section-label" data-i18n="lbl-solution">Solution</div>
        <div class="section-body"><p></p></div>
      </div>
    </aside>
    <main class="content">
      <h1 class="page-title">Penguin</h1>
      <div class="image-grid">
        <img src="images/penguin/nothing.webp" alt="Nothing" />
        <img src="images/penguin/nothing keeping.webp" alt="Nothing Keeping" />
        <img src="images/penguin/no limits.webp" alt="No Limits" />
        <img src="images/penguin/reading.webp" alt="Reading" loading="lazy" />
        <img src="images/penguin/there.webp" alt="There" loading="lazy" />
        <img src="images/penguin/truly.webp" alt="Truly" loading="lazy" />
        <img src="images/penguin/the world.webp" alt="The World" loading="lazy" />
        <img src="images/penguin/reading hvid.webp" alt="Reading Hvid" loading="lazy" />
        <img src="images/penguin/the freedom.webp" alt="The Freedom" loading="lazy" />
      </div>
      <div class="page-footer">
        <img src="images/penguin/penguin logo.webp" alt="Penguin logo" />
      </div>
    </main>
  </div>

  <!-- Lightbox -->
  <div id="pg-lb">
    <span id="pg-lb-close">&times;</span>
    <span class="pg-lb-arrow" id="pg-lb-prev">&#8592;</span>
    <img id="pg-lb-img" src="" alt="" />
    <span class="pg-lb-arrow" id="pg-lb-next">&#8594;</span>
  </div>

  <script>
    const gridImgs = Array.from(document.querySelectorAll('.image-grid img'));
    const lb = document.getElementById('pg-lb');
    const lbImg = document.getElementById('pg-lb-img');
    let current = 0;

    function openLb(index) {
      current = index;
      lbImg.src = gridImgs[current].src;
      lbImg.alt = gridImgs[current].alt;
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLb() {
      lb.classList.remove('open');
      document.body.style.overflow = '';
    }
    function prev() {
      current = (current - 1 + gridImgs.length) % gridImgs.length;
      lbImg.src = gridImgs[current].src;
      lbImg.alt = gridImgs[current].alt;
    }
    function next() {
      current = (current + 1) % gridImgs.length;
      lbImg.src = gridImgs[current].src;
      lbImg.alt = gridImgs[current].alt;
    }

    gridImgs.forEach((img, i) => img.addEventListener('click', () => openLb(i)));
    document.getElementById('pg-lb-close').addEventListener('click', closeLb);
    document.getElementById('pg-lb-prev').addEventListener('click', prev);
    document.getElementById('pg-lb-next').addEventListener('click', next);
    lb.addEventListener('click', (e) => { if (e.target === lb) closeLb(); });
    document.addEventListener('keydown', (e) => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') closeLb();
      if (e.key === 'ArrowLeft') prev();
      if (e.key === 'ArrowRight') next();
    });

    // ── Sidebar toggle ──────────────────────────────────────────────────────
    const sidebar   = document.querySelector('.sidebar');
    const toggleBtn = document.getElementById('sidebarToggle');
    function setSidebar(collapsed) {
      if (collapsed) {
        sidebar.classList.add('collapsed');
        toggleBtn.classList.add('collapsed');
        toggleBtn.innerHTML = '&#8250;';
        document.body.classList.add('sb-collapsed');
      } else {
        sidebar.classList.remove('collapsed');
        toggleBtn.classList.remove('collapsed');
        toggleBtn.innerHTML = '&#8249;';
        document.body.classList.remove('sb-collapsed');
      }
    }
    toggleBtn.addEventListener('click', () => {
      setSidebar(!sidebar.classList.contains('collapsed'));
    });
  </script>
<!-- ── DVD screensaver ── -->
<style>
  #dvd-saver{position:fixed;top:0;left:0;right:0;bottom:0;z-index:500;background:#000;opacity:0;pointer-events:none;transition:opacity 1.2s ease}
  #dvd-saver.active{opacity:1;pointer-events:all}
  body.dvd-active #lang-toggle,body.dvd-active #nav-shortcuts{opacity:0!important;pointer-events:none!important;transition:opacity 0.6s}
  #dvd-folder{position:absolute;top:0;left:0;width:220px;height:220px;-webkit-mask-image:url('images/folder_icon.svg');-webkit-mask-size:100% 100%;-webkit-mask-repeat:no-repeat;mask-image:url('images/folder_icon.svg');mask-size:100% 100%;mask-repeat:no-repeat;will-change:left,top}
  #dvd-folder-inner{width:100%;height:100%;position:relative}
  #dvd-folder-bg{position:absolute;inset:0;background:#fff;opacity:0;transition:opacity 0.1s}
  #dvd-folder-bg.show{opacity:1}
  #dvd-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
  #dvd-label{position:absolute;width:220px;text-align:center;font-family:sans-serif;color:#fff;font-size:1rem;letter-spacing:0.02em;text-shadow:0 1px 4px rgba(0,0,0,0.8),0 0px 10px rgba(0,0,0,0.5);pointer-events:none;will-change:left,top}
</style>
<div id="dvd-saver"><div id="dvd-folder"><div id="dvd-folder-inner"><div id="dvd-folder-bg"></div><img id="dvd-img" src="" alt="" /></div></div><div id="dvd-label"></div></div>
<script>
(function(){
  var THUMBS=['images/twice the fun thumbnail.webp','images/The Fizz Cap Lockup.webp','images/Bones.webp','images/le_ice.webp','images/penguin thumbnail.webp','images/mex&co.webp'];
  var NAMES=['Twice the FUN','The Fizz Cap','Bones','Le Ice','Penguin','Mex\u0026Co'];
  var BONES_IDX=2,IDLE_MS=5000,SIZE=220,SPEED=300,PAD_X=9,PAD_T=24,PAD_B=24;
  var saver=document.getElementById('dvd-saver'),folder=document.getElementById('dvd-folder'),img=document.getElementById('dvd-img'),bg=document.getElementById('dvd-folder-bg'),label=document.getElementById('dvd-label');
  var thumbIdx=0,x=0,y=0,vx=0,vy=0,active=false,lastTime=null,rafId=null,idleTimer=null;
  function setThumb(idx){thumbIdx=((idx%THUMBS.length)+THUMBS.length)%THUMBS.length;img.src=THUMBS[thumbIdx];label.textContent=NAMES[thumbIdx];if(thumbIdx===BONES_IDX)bg.classList.add('show');else bg.classList.remove('show');}function setPos(){folder.style.left=x+'px';folder.style.top=y+'px';label.style.left=x+'px';label.style.top=(y+SIZE-PAD_B+6)+'px';}
  function show(){if(active)return;active=true;var W=window.innerWidth,H=window.innerHeight,xMin=-PAD_X,xMax=W-SIZE+PAD_X,yMin=-PAD_T,yMax=H-SIZE+PAD_B;x=xMin+Math.random()*(xMax-xMin);y=yMin+Math.random()*(yMax-yMin);var ang=Math.PI/4;vx=Math.cos(ang)*SPEED*(Math.random()<0.5?1:-1);vy=Math.sin(ang)*SPEED*(Math.random()<0.5?1:-1);setThumb(Math.floor(Math.random()*THUMBS.length));setPos();saver.classList.add('active');document.body.classList.add('dvd-active');lastTime=null;rafId=requestAnimationFrame(tick);}
  function hide(){if(!active)return;active=false;saver.classList.remove('active');document.body.classList.remove('dvd-active');if(rafId){cancelAnimationFrame(rafId);rafId=null;}resetIdle();}
  function tick(now){if(!active)return;if(lastTime===null)lastTime=now;var dt=Math.min((now-lastTime)/1000,0.05);lastTime=now;var W=window.innerWidth,H=window.innerHeight,xMin=-PAD_X,xMax=W-SIZE+PAD_X,yMin=-PAD_T,yMax=H-SIZE+PAD_B;x+=vx*dt;y+=vy*dt;var b=false;if(x<=xMin){x=xMin;vx=Math.abs(vx);b=true;}if(x>=xMax){x=xMax;vx=-Math.abs(vx);b=true;}if(y<=yMin){y=yMin;vy=Math.abs(vy);b=true;}if(y>=yMax){y=yMax;vy=-Math.abs(vy);b=true;}if(b)setThumb(thumbIdx+1);setPos();rafId=requestAnimationFrame(tick);}
  function resetIdle(){clearTimeout(idleTimer);idleTimer=setTimeout(show,IDLE_MS);}
  ['mousemove','mousedown','keydown','touchstart','wheel'].forEach(function(ev){window.addEventListener(ev,function(){if(active){hide();return;}resetIdle();},{passive:true});});
  THUMBS.forEach(function(s){var i=new Image();i.src=s;});
  resetIdle();
})();
</script>
<script src="lang.js"></script>
</body>
</html>

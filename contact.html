<head>
  <meta charset="UTF-8" />

  <title>Contact — Anders Sveidahl</title>

  <meta name="author" content="Anders Sveidahl" />
  <link rel="canonical" href="https://anderssveidahl.com/contact.html" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Contact — Anders Sveidahl" />
  <meta property="og:description" content="Get in touch with Anders Sveidahl — graphic designer and creative." />
  <meta property="og:url" content="https://anderssveidahl.com/contact.html" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Contact — Anders Sveidahl" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000 url('images/ios wallpaper.webp') center center / cover no-repeat fixed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    }
    .icons-row {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: max(24px, 4.2vw);
    }
    .app-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: max(6px, 0.6vw);
      text-decoration: none;
      width: max(120px, 13.9vw);
    }
    .app-icon img {
      width: max(80px, 9.5vw);
      height: max(80px, 9.5vw);
      border-radius: max(18px, 2.1vw);
      display: block;
      transition: filter 0.15s ease;
    }
    .app-icon:hover img {
      filter: brightness(0.73);
    }
    .app-icon:active img {
      filter: brightness(0.50);
      transition: filter 0s;
    }
    .app-icon span {
      font-size: max(13px, 1.45vw);
      font-weight: 400;
      color: #fff;
      text-align: center;
      letter-spacing: 0.01em;
      line-height: 1.3;
      text-shadow: 0 1px 2px rgba(0,0,0,0.6);
      white-space: nowrap;
    }
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1c1c1e;
      color: #fff;
      font-size: 13px;
      padding: 10px 18px;
      border-radius: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 600px) {
      .icons-row {
        flex-direction: column;
        align-items: center;
        gap: 32px;
      }
      .app-icon img { width: 80px; height: 80px; border-radius: 20px; }
      .app-icon span { font-size: 15px; white-space: normal; text-align: center; }
    }
  </style>
</head>
<body>
<body>
  <main>
    <div class="icons-row">
      <a class="app-icon" id="mailIcon" href="mailto:a.sveidahl@gmail.com">
        <img src="images/gmail.webp" alt="Gmail" loading="lazy" />
        <span>a.sveidahl@gmail.com</span>
      </a>
      <a class="app-icon" href="sms:+4522121846">
        <img src="images/sms.webp" alt="SMS" loading="lazy" />
        <span>+45 2212 1846</span>
      </a>
      <a class="app-icon" href="https://linkedin.com/in/anders-sveidahl-058272294/?skipRedirect=true" target="_blank" rel="noopener">
        <img src="images/linkedin.webp" alt="LinkedIn" loading="lazy" />
        <span>/anderssveidahl</span>
      </a>
    </div>
  </main>
  <div class="toast" id="toast">a.sveidahl@gmail.com — copied!</div>
<script>
  document.getElementById('mailIcon').addEventListener('click', function() {
    setTimeout(function() {
      const toast = document.getElementById('toast');
      navigator.clipboard && navigator.clipboard.writeText('a.sveidahl@gmail.com').catch(()=>{});
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }, 300);
  });
</script>
<script src="lang.js"></script>

</body>
</html>

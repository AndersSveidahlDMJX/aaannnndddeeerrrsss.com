  <style>
    @font-face {
      font-family: 'ImpactLabel';
      src: url('fonts/ImpactLabel.ttf') format('truetype');
      font-display: swap;
    }
    @font-face {
      font-family: 'EnglishVivace';
      src: url('fonts/English%20111%20Vivace%20Regular.otf') format('opentype');
      font-display: swap;
    }
    @font-face {
      font-family: 'EurostileExtBlk';
      src: url('fonts/Eurostile-BoldExtendedTwo.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'EuroStyleNormal';
      src: url('fonts/EuroStyle%20Normal.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'EurostileLight';
      src: url('fonts/Eurostile%20light.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      height: 100vh;
      font-family: sans-serif;
    }

    .bg { display: none; }

    /* ── centered row of all 4 items ── */
    .items-row {
      position: fixed;
      top: 55%;
      left: 50%;
      transform: translate(-50%, calc(-50% + 1.875rem));
      display: flex;
      align-items: flex-end;
      gap: 4vw;
      z-index: 1;
    }

    .item-col {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      filter: brightness(0.48);
      transition: filter 0.55s ease;
      padding-top: 16px;
    }
    .item-col:hover {
      filter: brightness(1);
    }
    .items-row:has(.item-col:hover) .item-col:not(:hover) {
      filter: brightness(0.06);
      transition: filter 0.3s ease;
    }
    /* spotlights and ambient injected by JS */

    .item-col > a { display: block; }

    /* ── item wraps ── */
    .usb-wrap {
      display: inline-block;
      cursor: pointer;
      transform: translateX(15%) translateY(4.1vh) rotate(51deg) translateY(5vh) scale(0.67);
      transition: transform 0.3s ease;
    }
    .usb-wrap:hover { transform: translateX(15%) translateY(4.1vh) rotate(51deg) translateY(5vh) scale(0.703); }

    .diary-wrap {
      display: inline-block;
      cursor: pointer;
      transform: rotate(0deg) translateY(5px);
      transition: transform 0.3s ease;
    }
    .diary-wrap:hover { transform: rotate(0deg) translateY(5px) scale(1.05); }

    .toshiba-wrap {
      position: relative;
      display: inline-block;
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    .toshiba-wrap:hover { transform: scale(1.05); }

    .iphone-wrap {
      position: relative;
      display: inline-block;
      cursor: pointer;
      transform: rotate(0deg) translateY(-8px);
      transition: transform 0.3s ease;
    }
    .iphone-wrap:hover { transform: rotate(0deg) translateY(-8px) scale(1.05); }

    /* ── images ── */
    .usb-img {
      height: 25vh;
      height: 25dvh;
      width: auto;
      display: block;
      filter: drop-shadow(2px 5px 5px rgba(0,0,0,0.5));
    }

    @keyframes usb-eclipse-pulse {
      0%, 100% { filter: brightness(0.48) drop-shadow(0 0 10px rgba(220,225,255,0.35)) drop-shadow(0 0 24px rgba(210,215,255,0.15)); }
      50%       { filter: brightness(0.54) drop-shadow(0 0 20px rgba(230,235,255,0.65)) drop-shadow(0 0 44px rgba(215,220,255,0.28)); }
    }

    .diary-img {
      height: 56vh;
      height: 56dvh;
      width: auto;
      display: block;
      filter: drop-shadow(2px 5px 8px rgba(0,0,0,0.35));
    }

    .toshiba2 {
      display: block;
      max-width: 21.25vw;
      max-height: 38.25vh;
      max-height: 38.25dvh;
      width: auto;
      height: auto;
    }

    .toshiba1 {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      pointer-events: none;
    }

    .iphone-img,
    .iphone-on {
      height: 30vh;
      height: 30dvh;
      width: auto;
      display: block;
      filter: drop-shadow(2px 5px 10px rgba(0,0,0,0.4));
    }

    .iphone-on {
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
      transition: opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .iphone-wrap:hover .iphone-on {
      opacity: 1;
      transition: opacity 0.25s cubic-bezier(0.0, 0, 0.2, 1);
    }

    /* ── labels ── */
    .item-label {
      font-family: 'EnglishVivace', 'Brush Script MT', cursive;
      font-size: 1.8rem;
      background: linear-gradient(
        180deg,
        #c8c8c8 0%, #ffffff 18%, #7a7a7a 32%,
        #f0f0f0 48%, #666 62%, #e0e0e0 78%, #909090 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      padding: 0.25rem 0.5rem;
      pointer-events: none;
      white-space: nowrap;
      width: fit-content;
      margin-top: 0.875rem;
      filter: drop-shadow(0 0 6px rgba(255,255,255,0.25));
    }
    /* work-label same size so all three labels share the same height */

    /* ── site title ── */
    .site-title {
      position: fixed;
      top: 3.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      font-family: 'EurostileExtBlk', sans-serif;
      font-weight: normal;
      font-style: normal;
      font-size: 4rem;
      letter-spacing: 0.08em;
      white-space: nowrap;
      pointer-events: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: linear-gradient(
        180deg,
        #ffffff 0%,
        #e8e8e8 20%,
        #b0b0b0 55%,
        #7a7a7a 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      background-clip: text;
      text-shadow: 0 -1px 8px rgba(255,255,255,0.55), 0 2px 8px rgba(0,0,0,0.35);
      opacity: 1;
      transition: opacity 0.3s ease;
    }
    body:has(.item-col:hover) .site-title {
      opacity: 0.06;
    }
    .title-beam {
      transition: opacity 0.55s ease;
    }
    body:has(.item-col:hover) .title-beam {
      opacity: 0 !important;
    }

    /* ── hover bob animation ── */
    @keyframes hover-bob {
      0%   { transform: translateY(0px); }
      40%  { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }
    .item-col:hover > a,
    .usb-fixed:hover > a {
      animation: hover-bob 1.5s ease-in-out infinite;
    }

    /* ── USB fixed bottom-right ── */
    .usb-fixed {
      position: fixed;
      bottom: 2.5rem;
      right: 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 1;
    }
    .usb-fixed .usb-img {
      animation: usb-eclipse-pulse 4s ease-in-out infinite;
      transition: filter 0.55s ease;
    }
    .usb-fixed:hover .usb-img {
      animation: none;
      filter: brightness(1) drop-shadow(0 0 10px rgba(255,254,235,0.75)) drop-shadow(0 0 30px rgba(255,250,210,0.4)) drop-shadow(0 0 60px rgba(255,240,180,0.18));
    }
    .usb-fixed .item-label {
      opacity: 0.38;
      transition: opacity 0.55s ease;
    }
    .usb-fixed:hover .item-label {
      opacity: 1;
    }

    @media (max-width: 768px) {
      body {
        background: #000;
        height: 100dvh;
        overflow: hidden;
        display: block;
        padding: 0;
      }

      .bg { display: none; }
      .usb-fixed { display: none; }

      /* Title: fixed header, bigger, more breathing room */
      .site-title {
        position: fixed;
        top: 3vh;
        left: 0;
        width: 100%;
        transform: none;
        text-align: center;
        font-size: 11vw;
        line-height: 1;
        white-space: normal;
        padding: 48px 0 32px;
        background-color: rgba(0,0,0,0.85);
        background-image: linear-gradient(
          180deg,
          #ffffff 0%,
          #e8e8e8 20%,
          #b0b0b0 55%,
          #7a7a7a 100%
        );
        z-index: 100;
        pointer-events: none;
      }
      .site-title span { display: inline; }
      .site-title span:first-child::after { content: ' '; }

      /* Items row: Work+OtherStuff centered, About+Contact fixed to bottom */
      .items-row {
        position: fixed;
        top: calc(3vh + 150px);
        left: 0 !important;
        right: 0;
        bottom: 28vw;
        width: 100%;
        transform: none !important;
        display: flex;
        flex-direction: column;
        gap: 0;
        align-items: stretch;
        justify-content: center;
        padding: 0;
      }

      /* Work + OtherStuff: centered in upper area */
      .item-col:nth-child(2) { order: 1; }
      .usb-mobile { order: 3; position: relative; }
      .usb-mobile > a { pointer-events: all; }
      /* Divider between Work and ...other stuff — not an item-col, immune to all hover rules */
      .work-divider {
        order: 2;
        pointer-events: none;
        position: relative;
        width: 32%;
        height: 1px;
        margin: 14px auto 12px;
        align-self: center;
        background: linear-gradient(to right,
          transparent 0%,
          rgba(255,255,255,0.18) 20%,
          rgba(255,255,255,0.18) 46%,
          transparent 48%,
          transparent 52%,
          rgba(255,255,255,0.18) 54%,
          rgba(255,255,255,0.18) 80%,
          transparent 100%
        );
        box-shadow: 0 0 6px rgba(255,255,255,0.08);
      }
      .work-divider::after {
        content: '';
        position: absolute;
        top: 0;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: rgba(255,255,255,0.3);
        pointer-events: none;
      }
      /* About Me + Contact: fixed to bottom, side by side */
      .item-col:nth-child(1) {
        order: 3;
        position: fixed !important;
        bottom: 5vw;
        left: 0; right: 50%;
        width: 50%;
      }
      .item-col:nth-child(3) {
        order: 4;
        position: fixed !important;
        bottom: 5vw;
        left: 50%; right: 0;
        width: 50%;
      }
      /* Vertical divider between About Me and Contact */
      .item-col:nth-child(3)::before {
        content: '';
        position: absolute;
        left: 0;
        top: 20%;
        bottom: 20%;
        width: 1px;
        background: linear-gradient(to bottom, transparent 0%, rgba(255,255,255,0.18) 50%, transparent 100%);
        pointer-events: none;
      }

      .usb-wrap,
      .diary-wrap,
      .toshiba-wrap,
      .iphone-wrap { transform: none !important; transition: none; }

      .usb-img,
      .diary-img,
      .toshiba2,
      .toshiba1,
      .iphone-img,
      .iphone-on { display: none; }

      /* Tappable cell */
      .item-col {
        position: relative;
        width: 100%;
        margin: 0;
        filter: brightness(1);
        text-align: center;
        padding-top: 0;
      }
      .item-col > a {
        display: block;
        position: absolute;
        inset: 0;
        z-index: 2;
      }

      /* About Me + Contact: EurostileLight footer-nav style */
      .item-label {
        display: block;
        position: relative;
        z-index: 1;
        width: 100%;
        font-family: 'EurostileLight', sans-serif;
        font-size: 4vw;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        text-align: center;
        padding: 6px 0;
        pointer-events: none;
        background: linear-gradient(
          180deg,
          #909090 0%,
          #c0c0c0 30%,
          #787878 60%,
          #a0a0a0 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 0 4px rgba(255,255,255,0.12));
      }
      /* Work: dominant hero — padding-right compensates italic slant optical offset */
      .work-label {
        font-family: 'EnglishVivace', 'Brush Script MT', cursive;
        font-size: 28vw;
        letter-spacing: 0;
        text-transform: none;
        padding: 0 5vw 0 0;
        line-height: 1;
        opacity: 1;
        background: linear-gradient(
          180deg,
          #c8c8c8 0%, #ffffff 18%, #7a7a7a 32%,
          #f0f0f0 48%, #666 62%, #e0e0e0 78%, #909090 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 0 6px rgba(255,255,255,0.25));
      }
      /* Danish: "arbejde" is ~7 chars vs "work" at 4 — scale down to fit */
      html[lang="da"] .work-label {
        font-size: 16vw;
        padding-right: 3vw;
      }

      /* Other Stuff: secondary hero — bigger, same chrome */
      .usb-mobile .item-label {
        font-family: 'EnglishVivace', 'Brush Script MT', cursive;
        font-size: 13vw;
        letter-spacing: 0;
        text-transform: none;
        padding: 2px 2.5vw 0 0;
        pointer-events: none;
        background: linear-gradient(
          180deg,
          #c8c8c8 0%, #ffffff 18%, #7a7a7a 32%,
          #f0f0f0 48%, #666 62%, #e0e0e0 78%, #909090 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 0 6px rgba(255,255,255,0.25));
      }

    }

    /* Hide mobile USB on desktop */
    @media (min-width: 769px) {
      .usb-mobile { display: none; }
      .work-divider { display: none; }
    }

  </style>
</head>

  <script>
    const wrap = document.querySelector('.toshiba-wrap');
    const t2 = wrap.querySelector('.toshiba2');
    const t1 = wrap.querySelector('.toshiba1');
    let loopTimeout = null;
    let hovering = false;

    function loop() {
      if (!hovering) return;
      t1.style.display = 'block';
      loopTimeout = setTimeout(() => {
        t1.style.display = 'none';
        loopTimeout = setTimeout(() => {
          loop();
        }, 500);
      }, 500);
    }

    wrap.addEventListener('mouseenter', () => {
      hovering = true;
      loopTimeout = setTimeout(loop, 300);
    });

    wrap.addEventListener('mouseleave', () => {
      hovering = false;
      clearTimeout(loopTimeout);
      t1.style.display = 'none';
    });

  </script>
  <script>
    // Trim diary image: clip hover area and layout box to visible (non-transparent) pixels
    (function () {
      var img = document.querySelector('.diary-img');
      if (!img) return;

      var trimData = null; // cache pixel percentages

      function scanTrim() {
        if (trimData) return trimData;
        var c = document.createElement('canvas');
        c.width = img.naturalWidth;
        c.height = img.naturalHeight;
        var ctx = c.getContext('2d');
        try { ctx.drawImage(img, 0, 0); } catch (e) { return null; }
        var d = ctx.getImageData(0, 0, c.width, c.height).data;
        var W = c.width, H = c.height, thresh = 5;
        var t = H, b = 0, l = W, r = 0;
        for (var i = 3; i < d.length; i += 4) {
          if (d[i] > thresh) {
            var p = (i - 3) / 4, x = p % W | 0, y = (p / W) | 0;
            if (x < l) l = x; if (x > r) r = x;
            if (y < t) t = y; if (y > b) b = y;
          }
        }
        if (t >= b || l >= r) return null;
        trimData = {
          tP: t / H * 100, bP: (H - b - 1) / H * 100,
          lP: l / W * 100, rP: (W - r - 1) / W * 100
        };
        return trimData;
      }

      function applyTrim() {
        var tr = scanTrim();
        if (!tr) return;
        // clip-path removes visual transparent area AND restricts pointer events to visible region
        img.style.clipPath =
          'inset(' + tr.tP.toFixed(2) + '% ' + tr.rP.toFixed(2) + '% ' +
          tr.bP.toFixed(2) + '% ' + tr.lP.toFixed(2) + '%)';
        // Negative margins collapse the layout box to match the visible area
        var rH = img.clientHeight, rW = img.clientWidth;
        img.style.marginTop    = '-' + (tr.tP / 100 * rH).toFixed(1) + 'px';
        img.style.marginBottom = '-' + (tr.bP / 100 * rH).toFixed(1) + 'px';
        img.style.marginLeft   = '-' + (tr.lP / 100 * rW).toFixed(1) + 'px';
        img.style.marginRight  = '-' + (tr.rP / 100 * rW).toFixed(1) + 'px';
        centerOnToshiba();
      }

      function run() {
        if (img.complete && img.naturalWidth > 0) applyTrim();
        else img.addEventListener('load', applyTrim);
      }

      run();
      window.addEventListener('resize', function() { applyTrim(); });
    })();

    // Center the row on toshiba's midpoint rather than the group midpoint
    function centerOnToshiba() {
      var row = document.querySelector('.items-row');
      if (!row) return;
      if (window.innerWidth <= 768) {
        row.style.left = '';
        row.style.transform = '';
        return;
      }
      // Use item labels (exclude usb-mobile) — labels are reliably centered under each item
      var labels = Array.from(row.querySelectorAll('.item-col:not(.usb-mobile) .item-label'));
      row.style.transform = 'translateY(-50%)';
      row.style.left = '0';
      var rowRect = row.getBoundingClientRect();
      var rects = labels.map(function(l) { return l.getBoundingClientRect(); });
      var leftCenter  = rects[0].left + rects[0].width / 2;
      var rightCenter = rects[rects.length - 1].left + rects[rects.length - 1].width / 2;
      var visualCenter = (leftCenter + rightCenter) / 2;
      var offset = visualCenter - rowRect.left;
      row.style.left = (window.innerWidth / 2 - offset) + 'px';
      if (typeof positionSpotlights === 'function') positionSpotlights();
    }

    window.addEventListener('load', centerOnToshiba);
    window.addEventListener('resize', centerOnToshiba);

    // Scan visible pixel bounds of an image via canvas (returns % offsets, cached on img element)
    function scanImageBounds(img) {
      if (img._bounds) return img._bounds;
      var c = document.createElement('canvas');
      c.width = img.naturalWidth; c.height = img.naturalHeight;
      var ctx = c.getContext('2d');
      try { ctx.drawImage(img, 0, 0); } catch (e) { return null; }
      var d = ctx.getImageData(0, 0, c.width, c.height).data;
      var W = c.width, H = c.height, thresh = 5;
      var t = H, b = 0, l = W, r = 0;
      for (var i = 3; i < d.length; i += 4) {
        if (d[i] > thresh) {
          var p = (i - 3) / 4, x = p % W | 0, y = (p / W) | 0;
          if (x < l) l = x; if (x > r) r = x;
          if (y < t) t = y; if (y > b) b = y;
        }
      }
      if (t >= b || l >= r) return null;
      img._bounds = {
        tP: t / H * 100, bP: (H - b - 1) / H * 100,
        lP: l / W * 100, rP: (W - r - 1) / W * 100
      };
      return img._bounds;
    }

    (function () {
      // Trim transparent bottom edges so visual bottoms = layout bottoms.
      // With align-items:flex-end on the row, equal layout bottoms → equal visual bottoms.
      // Labels are position:absolute (top:100%), so col height = image height only.

      // ── Toshiba ─────────────────────────────────────────────────────────────
      // clip-path clips the visual transparent bottom of toshiba2.
      // margin-bottom on .toshiba-wrap (not toshiba2) collapses the layout gap
      // without changing toshiba-wrap's clientHeight → toshiba1 height:100% stays intact.
      var toshiba2   = document.querySelector('.toshiba2');
      var toshibaWrap = document.querySelector('.toshiba-wrap');

      function trimToshiba() {
        var tr = scanImageBounds(toshiba2);
        if (!tr) return;
        var botPx = (tr.bP / 100 * toshiba2.clientHeight);
        toshiba2.style.clipPath = 'inset(0 0 ' + botPx.toFixed(1) + 'px 0)';
        if (toshibaWrap) toshibaWrap.style.marginBottom = '-' + botPx.toFixed(1) + 'px';
        centerOnToshiba();
      }

      if (toshiba2) {
        if (toshiba2.complete && toshiba2.naturalWidth > 0) trimToshiba();
        else toshiba2.addEventListener('load', trimToshiba);
        window.addEventListener('resize', trimToshiba);
      }

      // ── iPhone ──────────────────────────────────────────────────────────────
      // iphone-on uses explicit height:30vh not height:100%, so margin-bottom
      // on iphone-img is safe — the overlay is unaffected.
      var iphoneImg = document.querySelector('.iphone-img');

      function trimIphone() {
        var tr = scanImageBounds(iphoneImg);
        if (!tr) return;
        var rH = iphoneImg.clientHeight;
        iphoneImg.style.marginTop    = '-' + (tr.tP / 100 * rH).toFixed(1) + 'px';
        iphoneImg.style.marginBottom = '-' + (tr.bP / 100 * rH).toFixed(1) + 'px';
        centerOnToshiba();
      }

      if (iphoneImg) {
        if (iphoneImg.complete && iphoneImg.naturalWidth > 0) trimIphone();
        else iphoneImg.addEventListener('load', trimIphone);
        window.addEventListener('resize', trimIphone);
      }
    })();

  </script>
  <script>
    // Fixed spotlight beams from top of viewport, one per item
    (function () {
      var BEAM_W = 640;
      var entries = [];

      function createAmbient() {
        var el = document.createElement('div');
        el.style.cssText = [
          'position:fixed','top:0','left:0','width:100vw','height:100vh',
          'pointer-events:none','z-index:2','mix-blend-mode:screen',
          'background:radial-gradient(ellipse 80% 55% at 50% -5%, rgba(200,200,180,0.13) 0%, transparent 100%)'
        ].join(';');
        document.body.appendChild(el);
      }

      function createBeam() {
        var el = document.createElement('div');
        // Three nested radial gradients: hot core + mid spread + outer halo
        // mix-blend-mode:screen = black is invisible, white adds light additively
        el.style.cssText = [
          'position:fixed','top:0',
          'height:100vh','width:' + BEAM_W + 'px',
          'pointer-events:none','z-index:3',
          'opacity:0','transition:opacity 0.55s ease',
          'mix-blend-mode:screen',
          'background:'
            + 'radial-gradient(ellipse 14% 50% at 50% 0%, rgba(255,255,248,0.42) 0%, rgba(255,252,230,0.14) 60%, transparent 100%),'
            + 'radial-gradient(ellipse 36% 78% at 50% 0%, rgba(255,251,225,0.2) 0%, rgba(255,245,200,0.07) 65%, transparent 100%),'
            + 'radial-gradient(ellipse 70% 100% at 50% 0%, rgba(255,248,210,0.07) 0%, transparent 80%)'
        ].join(';');
        document.body.appendChild(el);
        return el;
      }

      function init() {
        createAmbient();
        var cols = Array.from(document.querySelectorAll('.item-col'));
        var items = cols;
        items.forEach(function (item) {
          var el = createBeam();
          entries.push({ item: item, el: el });
          item.addEventListener('mouseenter', function () {
            if (window.innerWidth <= 768 && item.classList.contains('mobile-nav-only')) return;
            el.style.opacity = '1';
          });
          item.addEventListener('mouseleave', function () {
            if (window.innerWidth <= 768 && item.classList.contains('mobile-nav-only')) return;
            el.style.opacity = '0';
          });
        });
        positionSpotlights();
      }

      function positionSpotlights() {
        entries.forEach(function (e) {
          var rect = e.item.getBoundingClientRect();
          var cx = rect.left + rect.width / 2;
          e.el.style.left = (cx - BEAM_W / 2) + 'px';
        });
      }

      window.positionSpotlights = positionSpotlights;

      if (document.readyState === 'loading') {
        window.addEventListener('load', function () {
          init();
          // Re-position after fonts settle on mobile
          if (window.innerWidth <= 768) setTimeout(positionSpotlights, 300);
        });
      } else {
        init();
        if (window.innerWidth <= 768) setTimeout(positionSpotlights, 300);
      }
      window.addEventListener('resize', positionSpotlights);
      window.addEventListener('pageshow', positionSpotlights);
    })();

    // Permanent overhead spotlight for .site-title
    (function () {
      var BEAM_W = 1300;
      var beam = document.createElement('div');
      beam.className = 'title-beam';
      beam.style.cssText = [
        'position:fixed', 'top:-29vh',
        'height:58vh', 'width:' + BEAM_W + 'px',
        'pointer-events:none', 'z-index:1',
        'opacity:0.50',
        'mix-blend-mode:screen',
        'background:'
          + 'radial-gradient(ellipse 28% 52% at 50% 0%, rgba(255,255,255,0.52) 0%, rgba(255,255,250,0.18) 60%, transparent 100%),'
          + 'radial-gradient(ellipse 58% 80% at 50% 0%, rgba(255,255,252,0.26) 0%, rgba(255,255,248,0.09) 65%, transparent 100%),'
          + 'radial-gradient(ellipse 92% 100% at 50% 0%, rgba(255,255,252,0.11) 0%, transparent 80%)'
      ].join(';');
      document.body.appendChild(beam);

      function positionTitleBeam() {
        var title = document.querySelector('.site-title');
        if (!title) return;
        var rect = title.getBoundingClientRect();
        var cx = rect.left + rect.width / 2;
        beam.style.left = (cx - BEAM_W / 2) + 'px';
      }

      if (document.readyState === 'loading') {
        window.addEventListener('load', positionTitleBeam);
      } else {
        positionTitleBeam();
      }
      window.addEventListener('resize', positionTitleBeam);
    })();
  </script>
<script>
  // Fade to black when navigating away from index
  (function () {
    var _navigating = false;
    var _overlay = null;

    // On bfcache restore (back button), fade the overlay back out
    window.addEventListener('pageshow', function (e) {
      _navigating = false;
      if (_overlay && _overlay.parentNode) {
        _overlay.style.transition = 'opacity 0.35s ease';
        _overlay.style.opacity = '0';
        _overlay.addEventListener('transitionend', function () {
          if (_overlay && _overlay.parentNode) _overlay.parentNode.removeChild(_overlay);
          _overlay = null;
        }, { once: true });
      }
    });
    document.addEventListener('click', function (e) {
      if (_navigating) return;
      var anchor = e.target.closest('a[href]');
      // If tap landed on a label or other child outside the <a> (mobile: images hidden),
      // find the anchor inside the same item column or USB block
      if (!anchor) {
        var col = e.target.closest('.item-col, .usb-fixed');
        if (col) anchor = col.querySelector('a[href]');
      }
      if (!anchor) return;
      var href = anchor.getAttribute('href');
      if (!href || href.charAt(0) === '#' || href.indexOf('://') !== -1 || href.indexOf('mailto:') === 0) return;
      e.preventDefault();
      e.stopImmediatePropagation();
      _navigating = true;
      _overlay = document.createElement('div');
      var out = _overlay;
      out.style.cssText = [
        'position:fixed','top:0','left:0','width:100%','height:100%',
        'background:#000','z-index:99999','pointer-events:none',
        'opacity:0','transition:opacity 0.8s ease'
      ].join(';');
      document.body.appendChild(out);
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          out.style.opacity = '1';
          out.addEventListener('transitionend', function () {
            window.location.href = href;
          }, { once: true });
          // Fallback in case transitionend doesn't fire (e.g. reduced-motion)
          setTimeout(function () { window.location.href = href; }, 900);
        });
      });
    }, true);
  })();
</script>

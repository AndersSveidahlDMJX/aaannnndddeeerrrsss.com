<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style id="page-load-bg">body{background:#000!important}</style>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/webp" href="images/fly emoji.webp" />
  <title>My Favorite Emoji — aaannndddeeerrrsss</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
    }

    /* scanlines overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.18) 2px,
        rgba(0,0,0,0.18) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    .back {
      position: fixed;
      top: 30px;
      left: 30px;
      text-decoration: none;
      color: #00ff41;
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.2rem;
      opacity: 0.7;
      transition: opacity 0.2s ease;
      z-index: 10;
    }
    .back:hover { opacity: 1; }

    .page-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(1.4rem, 5vw, 3rem);
      letter-spacing: 0.12em;
      color: #00ff41;
      text-shadow: 0 0 10px #00ff41, 0 0 30px #00aa2280;
      white-space: nowrap;
      text-transform: lowercase;
    }

    /* flyswatter cursor — custom SVG */
    .fly-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .fly-wrap img {
      width: max(120px, 20vw);
      height: auto;
      cursor: pointer;
      transition: filter 0.1s;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* blood splat blob */
    .blood-splat {
      position: absolute;
      width: max(160px, 26vw);
      height: max(160px, 26vw);
      pointer-events: none;
      z-index: 20;
      animation: splat-anim 1.8s ease-out forwards;
    }
    .blood-splat svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 8px #cc0000);
    }

    @keyframes splat-anim {
      0%   { opacity: 0; transform: scale(0.2) rotate(-20deg); }
      12%  { opacity: 1; transform: scale(1.15) rotate(4deg); }
      30%  { opacity: 1; transform: scale(1) rotate(0deg); }
      70%  { opacity: 1; transform: scale(1) rotate(0deg); }
      100% { opacity: 0; transform: scale(0.9) rotate(0deg); }
    }

    .fly-wrap img.dead {
      display: none;
    }

    /* sad face reveal */
    .sad-face {
      display: none;
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(2rem, 8vw, 5rem);
      color: #00ff41;
      text-shadow: 0 0 14px #00ff41, 0 0 40px #00aa2240;
      animation: sad-in 0.6s ease forwards;
    }

    @keyframes sad-in {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #nav-shortcuts { display: none !important; }
    @media (max-width: 768px) { .back { display: none !important; } }
  </style>
</head>
<body>
  <a class="back" href="other-stuff.html">‹</a>
  <div class="page-title" data-i18n="fav-emoji-title">den her</div>
  <div class="fly-wrap">
    <img id="the-fly" src="images/fly emoji.webp" alt="🪰" />
    <div class="sad-face" id="sad-face">:(</div>
  </div>

  <script>
    const fly = document.getElementById('the-fly');
    const sad = document.getElementById('sad-face');
    const title = document.querySelector('.page-title');

    fly.addEventListener('click', () => {
      if (fly.classList.contains('dead')) return;
      fly.classList.add('dead');

      // hide title
      title.style.transition = 'opacity 0.3s';
      title.style.opacity = '0';

      // build blood splat SVG
      const splat = document.createElement('div');
      splat.className = 'blood-splat';
      splat.innerHTML = `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <g fill="#cc0000">
          <ellipse cx="100" cy="100" rx="52" ry="48"/>
          <ellipse cx="140" cy="72" rx="22" ry="14" transform="rotate(-30 140 72)"/>
          <ellipse cx="62" cy="68" rx="18" ry="12" transform="rotate(25 62 68)"/>
          <ellipse cx="148" cy="130" rx="16" ry="10" transform="rotate(15 148 130)"/>
          <ellipse cx="55" cy="138" rx="20" ry="11" transform="rotate(-20 55 138)"/>
          <ellipse cx="100" cy="52" rx="10" ry="18" transform="rotate(10 100 52)"/>
          <ellipse cx="104" cy="155" rx="12" ry="20" transform="rotate(-5 104 155)"/>
          <circle cx="162" cy="96" r="9"/>
          <circle cx="42" cy="100" r="7"/>
          <circle cx="130" cy="158" r="6"/>
          <circle cx="74" cy="155" r="5"/>
          <circle cx="158" cy="58" r="5"/>
          <circle cx="46" cy="62" r="6"/>
          <!-- drips -->
          <ellipse cx="100" cy="175" rx="4" ry="9"/>
          <ellipse cx="142" cy="170" rx="3" ry="7" transform="rotate(10 142 170)"/>
          <ellipse cx="60" cy="168" rx="3" ry="6" transform="rotate(-8 60 168)"/>
          <ellipse cx="168" cy="108" rx="7" ry="3" transform="rotate(-15 168 108)"/>
          <ellipse cx="32" cy="112" rx="6" ry="3" transform="rotate(10 32 112)"/>
        </g>
      </svg>`;
      fly.parentNode.appendChild(splat);

      // remove splat and show sad face after animation
      setTimeout(() => {
        splat.remove();
        sad.style.display = 'block';
      }, 1800);
    });
  </script>

  <script src="lang.js"></script>
  <!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "893261a273b949c48f5b610db9c0fc78"}'></script><!-- End Cloudflare Web Analytics -->
</body>
</html>
